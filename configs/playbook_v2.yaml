  - id: "3.5"
    cycle: 3
    window: ["2026-06-10", "2026-12-31"]
    label: "Concentration check (NRA version) — >13% positions: bar new cash until <11%, never sell"
    condition: {}
    orders: []

# ── §8 NRA TAX ENGINE ───────────────────────────────────────────────────────
tax:
  status: "Nonresident alien (F-1 yr 3, 183+ days) · NY State tax resident"
  federal_rate: 0.30          # flat on net US-source capital gains (Schedule NEC, 1040-NR)
  state_rate: 0.06            # NY at bracket
  shield_year: 2026
  # Realized YTD baseline (from the portfolio JSON cleanup ledger). The blotter
  # adds to this. Net ≈ –$905 → ~$905 of additional 2026 gains cost ~$0.
  notes:
    - "No long-term rate, no short-term rate — holding period is irrelevant federally."
    - "Losses are same-year-only: no carryforward, no $3k income offset. Unabsorbed losses evaporate Dec 31."
    - "Never trim winners outside the shield while 183-day NRA + NY resident (~36% haircut)."
    - "Departure-year window (<183 days present): US-source gains 0% federal — the natural year to realize big embedded gains; end NY domicile first."
    - "Dividends leak 25–30% (US-India treaty trims portfolio dividends to ~25%) → ABBV demoted; prefer sub-1% yielders and zero-dividend growth."
    - "SPAXX distributions generally treaty/portfolio-interest-exempt for NRAs."
    - "Confirm Fidelity W-8BEN on file (expect 1042-S, not 1099-B/DIV)."

# Pre-buy chart check (§7) — surfaced in the briefing as a manual checklist.
prebuy_checklist:
  - "Price vs 50-day MA — quality below it = dip; >15% above = chase"
  - "Price vs 200-day MA — below needs a fundamental reason"
  - "Distance from 52-wk high — quality at −10–20% = sweet spot; −40%+ = market knows something"
  - "Unfilled earnings gaps — gap-downs above = resistance; gap-ups below = support"
  - "Volume — shrinking down-days + expanding up-days = accumulation"

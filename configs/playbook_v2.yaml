  - {date: "2026-09-30", event: "Rolling: Iran talks · CXMT Shanghai listing · YMTC IPO", flags: [O]}

# ── §4 CYCLE PLAYBOOKS ──────────────────────────────────────────────────────
# Conditions:
#   flags_any: {F: [YELLOW]}  → flag F must be one of the listed colors
#   flags_not: {S: [RED]}     → flag S must NOT be any of the listed colors
#   composite: [YELLOW]       → composite must be one of these
#   event: {key: mu_jun24, equals: beat_raise_flat}  → manual event in
#          configs/flag_overrides.yaml must equal this value
# Orders:
#   max_price / min_price / price_range guard execution — if price is outside
#   the range at order time, THE RULE DOES NOT FIRE.
cycles:
  - id: "0.0"
    cycle: 0
    window: ["2026-06-10", "2026-06-17"]
    label: "Volatility cluster — BUY NOTHING, HOLD EVERYTHING"
    condition: {}
    orders: []
    note: "SpaceX IPO + Warsh FOMC. Cash earns ~4% in SPAXX."

  - id: "0.1"
    cycle: 0
    window: ["2026-06-18", "2026-06-30"]
    label: "Post-FOMC base case"
    condition:
      flags_any: {F: [YELLOW], I: [GREEN]}
      flags_not: {S: [RED]}
    orders:
      - {ticker: NVO, dollars: 450, max_price: 45.0, approx_shares: "~10 sh"}
      - {ticker: MSFT, dollars: 400, price_range: [380.0, 410.0], approx_shares: "1 sh"}
    note: "Rest stays SPAXX."

  - id: "0.2"
    cycle: 0
    window: ["2026-06-18", "2026-06-30"]
    label: "Dovish surprise — all of 0.1 plus GOOGL"
    condition:
      flags_any: {F: [GREEN]}
      flags_not: {S: [RED]}
    includes: ["0.1"]
    orders:
      - {ticker: GOOGL, dollars: 700, max_price: 365.0, approx_shares: "2 sh"}

  - id: "0.3"
    cycle: 0
    window: ["2026-06-18", "2026-06-30"]
    label: "F=RED — buy nothing, re-run flags Jul 1"
    condition:
      flags_any: {F: [RED]}
    orders: []

  - id: "0.4"
    cycle: 0
    window: ["2026-06-18", "2026-06-30"]
    label: "S=RED — suspend 0.1/0.2; only the NVO leg may execute"
    condition:
      flags_any: {S: [RED]}
    orders:
      - {ticker: NVO, dollars: 450, max_price: 45.0}

  - id: "0.5"
    cycle: 0
    window: ["2026-06-10", "2026-06-24"]
    label: "MU before earnings — BUY $0, no exceptions (binary events aren't entries)"
    condition: {}
    orders: []


# ============================================================================
# Investment Decision Tree v2 — NRA Edition (Jun 10 → Sep 2026)
# Machine-readable encoding of investment-decision-tree-v2-nra.pdf.
#
# This file is the single source of truth for:
#   - the five flags (O/F/I/S/C) and their GREEN/YELLOW/RED thresholds
#   - the composite deployment rule
#   - standing sell/hold rules for existing positions (§3)
#   - cycle playbooks 0–3 (§4)
#   - never-buy list (§5), re-entry lockouts, position caps
#   - catalyst calendar (§2)
#   - NRA tax engine facts (§8)
#
# Quantitative flags (O, I, S) are looked up live. Qualitative flags (F tone,
# C capex) come from configs/flag_overrides.yaml with an automatic fallback.
# Research framework only — not personalized financial advice.
# ============================================================================

version: v2-nra
as_of: "2026-06-10"
horizon_end: "2026-09-30"
owner: Arka

# Sizing: dollar amounts in cycle rules assume this monthly contribution.
# Scale ±20% for $2k / $3k months.
monthly_contribution: 2500

baseline:
  # Jun 10 invested value — anchor for rule 3.4 (15% drawdown → semi freeze).
  invested_value: 15900.0
  drawdown_semi_freeze: 0.15

# ── §1 THE FIVE FLAGS ───────────────────────────────────────────────────────
flags:
  O:
    name: "Oil / Iran"
    metric: "Brent crude front month"
    source: "yfinance BZ=F"
    green: "< $85 and falling (or real deal — set via override)"
    yellow: "$85–105"
    red: "> $105 sustained (5-day avg), or Hormuz re-closed / strikes resume"
    thresholds: {green_below: 85.0, red_above: 105.0}
  F:
    name: "Fed"
    metric: "Policy + tone"
    source: "FRED DFEDTARU trend + manual tone override"
    green: "Hold, neutral/dovish"
    yellow: "Hold, hawkish"
    red: "Hike, or dots/statement signal hikes"
    lookback_days: 75   # window for detecting a target-rate move
  I:
    name: "Inflation"
    metric: "Core CPI m/m (CPILFESL), headline YoY (CPIAUCSL)"
    source: "FRED"
    green: "core m/m ≤ 0.2%"
    yellow: "core m/m 0.3%"
    red: "core m/m ≥ 0.4%, or headline YoY > 5%"
    thresholds: {green_mom: 0.2, red_mom: 0.4, red_headline_yoy: 5.0}
  S:
    name: "Semi tape"
    metric: "Nasdaq-100 level"
    source: "yfinance ^NDX"
    green: "> 30,034"
    yellow: "28,663–30,034"
    red: "< 28,663 (trend broken; 50-day ≈ 27,834 at print)"
    thresholds: {green_above: 30034.0, red_below: 28663.0}
  C:
    name: "AI capex"
    metric: "Hyperscaler capex guidance"
    source: "manual override (earnings coverage); TSM monthly rev = telemetry"
    green: "Maintained / raised"
    yellow: "Mixed / murky"
    red: "Any major announces a capex cut — the one true cycle-breaker"

composite:
  # GREEN  = ≥4 flags green, 0 red  → deploy 100% of the cycle's cash
  # YELLOW = anything else          → deploy in 2 halves ~2 weeks apart
  # RED    = any flag red           → defensives only, max 25% of tranche
  green_min_greens: 4
  deployment: {GREEN: 1.0, YELLOW: 0.5, RED: 0.25}
  # C=RED alone overrides everything for semis — no semi buys, period.
  semi_freeze_flags: [C, S]

defensives: [NVO, PGR, SPAXX]

# ── Ticker classification (drives semi-freeze and sector gates) ────────────
ticker_classes:
  semi:     [NVDA, AMD, TSM, MU, AVGO, ARM, MRVL, QCOM, INTC, GFS, SMCI, SNDK, NBIS, CRWV, APLD, IREN]
  semicap:  [ASML, LRCX, KLAC, AMAT, TER, SNPS, CDNS, TOELY, SUMCF, SHECY, LITE]
  hyperscaler: [MSFT, GOOGL, GOOG, AMZN, META, ORCL]
  defensive: [NVO, PGR, INCY, NBIX, GILD, EXEL, UTHR]
  speculative: [BE, APLD, IREN, SBET]   # "BE = most speculative, not in any rule"

# ── §3 STANDING SELL / HOLD RULES (existing positions — definitive) ────────
# NRA prime directive: realized gains cost ≈36% all-in. Winners are not sold
# for "rebalancing" — concentration is fixed by steering NEW cash elsewhere.
standing_rules:
  - tickers: [TSM, NVDA, SPMO, GOOGL, AMD, CRWD, AMZN]
    kind: hold_winner
    note: "HOLD — do not trim. Sell only on thesis break (Taiwan escalation, C=RED capex cycle-break)."
  - tickers: [META]
    kind: hold_core
    note: "No sell trigger — contrarian core. Add-rule lives in Cycle 2 (rule 2.3)."
  - tickers: [MSFT]
    kind: hold_accumulate
    note: "Buy-rules in Cycle 0/1."
  - tickers: [HOOD]
    kind: stop_and_trim
    stop_below: 75.0          # close < $75 → SELL ALL (≈15% trail)
    trim_above: 110.0         # > $110 blow-off → TRIM 1/2
    note: "Gain lands in the 2026 tax shield — a HOOD sale is ~federally free this year."
  - tickers: [NOW]
    kind: probation_floor
    hard_floor: 95.0          # closes < $95 → sell without waiting
    event_key: now_q2
    event_sell_value: guide_cut
    note: "Probation through late-Jul earnings. Guide cut → SELL, same-week redeploy into MSFT."
  - tickers: [CRM]
    kind: probation_floor
    hard_floor: 155.0
    event_key: crm_q2
    event_sell_value: guide_cut
    note: "Same swap logic as NOW."
  - tickers: [UBER]
    kind: probation_band
    sell_below: 62.0
    strength_exit: [78.0, 82.0]   # bounces here first → SELL into strength
    event_key: uber_q2
    event_sell_value: weak_guide
    note: "Probation into ~early-Aug earnings."
  - tickers: [DASH]
    kind: exit_band
    recovery_exit: [170.0, 185.0]
    capitulation_below: 140.0
    note: "No tax reason to rush — NRA losses past the shield do nothing."
  - tickers: [CRWV]
    kind: event_kill_switch
    event_key: crwv_equity_raise
    note: "HOLD tiny, never add. Announces an equity raise → SELL same day (SMCI precedent −13–21%)."
  - tickers: [NFLX, SPOT, ORCL, RDDT]
    kind: starmine_review
    starmine_below: 2.0
    note: "Small, fine. StarMine < 2.0 → review."
  - tickers: [TW]
    kind: floor
    sell_below: 90.0
    note: "Sell if closes < $90."
  - tickers: [BCS]
    kind: hold
    note: "BCS benefits from higher-for-longer."

# ── §5 NEVER-BUY LIST (watchlist verdicts, StarMine ≤ 3) ────────────────────
never_buy:
  TSLA: 0.5
  COIN: 0.5
  DASH: 0.7
  RBLX: 0.2
  ALSN: 0.7
  Z: 0.7
  NKE: 0.2
  HIMS: 0.9
  CORT: 0.8
  HOOD: 1.5    # hold ≠ add
  UBER: 1.2    # hold ≠ add
  JPM: 1.1
  CVNA: 3.0
  BABA: 2.7
  APLD: 2.7    # dilution-funded infra class
  KGC: 2.1
  AEM: 2.1
  RL: 1.8
  CL: 1.9
  VRTX: 2.4
  ABBV: 7.5    # demoted for NRA specifically — 25–30% dividend leak (§8)

# Re-entry lockouts: the 7 cleanup names. Re-entry EVER requires
# StarMine > 6 AND price > 50-day MA. (At print, all fail.)
reentry_lockouts:
  tickers: [SBET, SQNS, MNDY, INTU, DUOL, COIN, SNAP]
  min_starmine: 6.0
  require_above_sma50: true

# ── Position caps (rule 3.5 + per-name caps) ────────────────────────────────
position_caps:
  # Any position > max_pct: do NOT sell — new cash is barred from that name
  # until weight < resume_pct.
  max_pct: 13.0
  resume_pct: 11.0
  per_ticker:
    MU: 4.0       # China memory risk — hard cap no matter how good Jun 24 looks
    META: 13.0    # rule 2.3 cap
    TSM: 12.0     # rule 1.3 substitution guard


    cycle: 0
    window: ["2026-06-25", "2026-07-22"]
    label: "MU miss/weak guide — no MU for 4 weeks; semicap sympathy drop >8% w/ intact guide = Cycle-1 semi pick"
    condition:
      event: {key: mu_jun24, equals: miss}

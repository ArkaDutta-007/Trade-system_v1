    cycle: 0
    window: ["2026-06-25", "2026-07-15"]
    label: "MU beat, gaps up >10% — do not chase; revisit at gap-fill or 20-day MA"
    condition:
      event: {key: mu_jun24, equals: beat_gap_up}
    orders: []


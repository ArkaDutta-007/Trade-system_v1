  - id: "3.1"
    cycle: 3
    window: ["2026-09-01", "2026-09-30"]
    label: "O=GREEN + C=GREEN — pyramid best Jul/Aug buy + start GEV after a clean Q2 print"
    condition:
      flags_any: {O: [GREEN], C: [GREEN]}
